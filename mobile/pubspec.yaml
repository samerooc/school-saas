name: school_saas
description: SchoolSaaS — Complete School Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # Secure Storage (iOS Keychain + Android Keystore)
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.2.1

  # Local DB (offline support)
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # YouTube Player
  youtube_player_flutter: ^9.0.2

  # Video Player (Cloudflare HLS)
  video_player: ^2.8.6
  chewie: ^1.7.5

  # Push Notifications
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.1.2

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  intl: ^0.19.0
  url_launcher: ^6.2.6

  # File / PDF
  open_file: ^3.3.2
  path_provider: ^2.1.3
  dio: ^5.4.3

  # QR Code (for attendance)
  qr_flutter: ^4.1.0
  mobile_scanner: ^4.0.1

  # Biometric Auth
  local_auth: ^2.2.0

  # Connectivity
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
